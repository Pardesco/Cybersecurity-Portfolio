version: '3.8'

services:
  # The NVIDIA Triton Inference Server hosts our machine learning model on the GPU
  triton:
    image: nvcr.io/nvidia/tritonserver:23.08-py3
    container_name: triton-server
    command: tritonserver --model-repository=/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./models:/models
    ports:
      - "8000:8000" # HTTP
      - "8001:8001" # GRPC
      - "8002:8002" # Metrics
    shm_size: '2gb'

  # The Morpheus Pipeline orchestrates data flow, cuDF preprocessing, and alerting
  morpheus:
    image: nvcr.io/nvidia/morpheus/morpheus:24.03-runtime
    container_name: morpheus-pipeline
    depends_on:
      - triton
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command: python pipeline.py
    shm_size: '4gb'
